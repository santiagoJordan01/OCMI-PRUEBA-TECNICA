services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: timesheets
      POSTGRES_PASSWORD: timesheets
      POSTGRES_DB: timesheets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesheets"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
